version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: fitguru_postgres
    restart: always

    environment:
      POSTGRES_DB: fitguru
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - fitguru_pgdata:/var/lib/postgresql/data

volumes:
  fitguru_pgdata: